version: "3.7"

services:

  ## ─── Servidor Web (relay + static files) ───────────────────────────────── ##
  app:
    image: donate-accounts:latest
    command: node server.js

    environment:
      - NODE_ENV=production
      - PORT=3000
      - WORKER_SECRET=donate-worker-2025

    networks:
      - CineBotNet

    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      labels:
        ## Traefik routing
        - traefik.enable=true
        - traefik.http.routers.donate.rule=Host(`contas.cineplusapp.shop`)
        - traefik.http.routers.donate.entrypoints=websecure
        - traefik.http.routers.donate.tls.certresolver=letsencryptresolver
        - traefik.http.routers.donate.service=donate
        - traefik.http.services.donate.loadbalancer.server.port=3000
        - traefik.http.services.donate.loadbalancer.passHostHeader=true
        ## WebSocket support (necessário para socket.io)
        - traefik.http.middlewares.donate-ws.headers.customrequestheaders.X-Forwarded-Proto=https
        - traefik.http.routers.donate.middlewares=donate-ws

  ## ─── Worker Baileys (roda na VPS, IP local) ────────────────────────────── ##
  worker:
    image: donate-accounts:latest
    command: node worker.js

    environment:
      - WORKER_SECRET=donate-worker-2025
      ## Conecta ao app via rede interna (não passa pela internet)
      - SERVER_URL=http://app:3000

    volumes:
      - donate_sessions:/app/sessions

    networks:
      - CineBotNet

    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager

## ─── Volumes ────────────────────────────────────────────────────────────── ##
volumes:
  donate_sessions:
    external: false

## ─── Rede ───────────────────────────────────────────────────────────────── ##
networks:
  CineBotNet:
    external: true
    name: CineBotNet
